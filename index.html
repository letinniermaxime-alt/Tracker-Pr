<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2126;
    --border: #2a2d35;
    --accent: #c8f135;
    --accent2: #4ade80;
    --accent3: #fb923c;
    --muted: #5a6070;
    --text: #e8eaf0;
    --text2: #9aa0b0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }
  .header-stats {
    display: flex;
    gap: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .header-stats strong { color: var(--accent); font-size: 16px; display: block; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 2px;
    padding: 12px 24px 0;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 8px 16px;
    border: none;
    background: none;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color .15s;
  }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN */
  main { padding: 24px; max-width: 900px; margin: 0 auto; }

  .section { display: none; }
  .section.active { display: block; }

  /* EXERCISE CARD */
  .exo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .exo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    position: relative;
    overflow: hidden;
  }
  .exo-card:hover { border-color: var(--accent); background: var(--surface2); }
  .exo-card.has-pr::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .exo-name {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 10px;
    color: var(--text);
  }
  .exo-tag {
    display: inline-block;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--muted);
    margin-bottom: 12px;
  }

  .pr-display {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .pr-pill {
    text-align: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    min-width: 60px;
  }
  .pr-pill .val {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    display: block;
  }
  .pr-pill .lbl {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }
  .pr-pill.empty .val { color: var(--border); }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }
  .modal-tag {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-top: 3px;
  }
  .close-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 30px; height: 30px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .close-btn:hover { color: var(--text); }

  /* FORM */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }
  .form-group input, .form-group select, .form-group textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }
  .form-group textarea { resize: vertical; min-height: 60px; }

  .btn-primary {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #0e0f11;
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    margin-top: 14px;
    transition: opacity .15s;
  }
  .btn-primary:hover { opacity: .85; }

  /* HISTORY */
  .history-section { margin-top: 20px; }
  .history-title {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .history-entry {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 12px;
    font-size: 13px;
  }
  .history-entry .h-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 80px;
    flex-shrink: 0;
  }
  .history-entry .h-val {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--accent2);
    flex: 1;
  }
  .history-entry .h-note {
    color: var(--text2);
    font-size: 11px;
    flex: 2;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
  }
  .history-entry .h-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .history-entry .h-del:hover { color: #f87171; background: rgba(248,113,113,.1); }
  .history-entry.is-pr { border-color: rgba(200,241,53,.25); }
  .pr-badge {
    background: var(--accent);
    color: #0e0f11;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    padding: 1px 5px;
    border-radius: 3px;
  }

  /* GLOBAL LOG */
  .log-filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .log-filters select, .log-filters input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    outline: none;
  }
  .log-filters select:focus, .log-filters input:focus { border-color: var(--accent); }
  .log-table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }
  tbody tr { border-bottom: 1px solid rgba(42,45,53,.6); }
  tbody tr:hover td { background: var(--surface); }
  tbody td {
    padding: 9px 10px;
    font-size: 12px;
  }
  td.td-val {
    font-family: 'DM Mono', monospace;
    color: var(--accent2);
    font-weight: 500;
  }
  td.td-pr { color: var(--accent); font-family: 'DM Mono', monospace; font-weight: 500; }
  td.td-note { color: var(--text2); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
  }
  .empty span { display: block; font-size: 32px; margin-bottom: 8px; }

  /* GRAPH */
  .graph-wrap { margin-top: 10px; }
  canvas { width: 100% !important; border-radius: 8px; background: var(--surface2); }

  /* SECTION HEADER */
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .section-head h2 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
  }
  .btn-sm {
    padding: 6px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  /* RESPONSIVE */
  @media (max-width: 500px) {
    header { padding: 20px 16px 16px; }
    main { padding: 16px; }
    .exo-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">PR<span>.</span>tracker</div>
  <div class="header-stats">
    <div><strong id="stat-total">0</strong>entrées</div>
    <div><strong id="stat-exos">0</strong>exercices</div>
    <div><strong id="stat-prs">0</strong>PRs actifs</div>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="push">Push</button>
  <button class="tab" data-tab="pull">Pull / Tractions</button>
  <button class="tab" data-tab="legs">Legs</button>
  <button class="tab" data-tab="core">Core / Skills</button>
  <button class="tab" data-tab="cardio">Cardio</button>
  <button class="tab" data-tab="log">Journal global</button>
</nav>

<main>
  <!-- PUSH -->
  <div class="section active" id="tab-push">
    <div class="section-head"><h2>Push</h2></div>
    <div class="exo-grid" id="grid-push"></div>
  </div>

  <!-- PULL -->
  <div class="section" id="tab-pull">
    <div class="section-head"><h2>Pull / Tractions</h2></div>
    <div class="exo-grid" id="grid-pull"></div>
  </div>

  <!-- LEGS -->
  <div class="section" id="tab-legs">
    <div class="section-head"><h2>Legs</h2></div>
    <div class="exo-grid" id="grid-legs"></div>
  </div>

  <!-- CORE / SKILLS -->
  <div class="section" id="tab-core">
    <div class="section-head"><h2>Core / Skills</h2></div>
    <div class="exo-grid" id="grid-core"></div>
  </div>

  <!-- CARDIO -->
  <div class="section" id="tab-cardio">
    <div class="section-head"><h2>Cardio</h2></div>
    <div class="exo-grid" id="grid-cardio"></div>
  </div>

  <!-- LOG GLOBAL -->
  <div class="section" id="tab-log">
    <div class="section-head"><h2>Journal global</h2>
      <button class="btn-sm" id="btn-export">⬇ Exporter JSON</button>
    </div>
    <div class="log-filters">
      <select id="filter-exo"><option value="">Tous les exercices</option></select>
      <input type="date" id="filter-from" placeholder="Depuis">
      <input type="date" id="filter-to" placeholder="Jusqu'à">
      <label style="display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;">
        <input type="checkbox" id="filter-pr" style="accent-color:var(--accent)"> PR seulement
      </label>
    </div>
    <div class="log-table-wrap">
      <table>
        <thead><tr>
          <th>Date</th>
          <th>Exercice</th>
          <th>Résultat</th>
          <th>PR ?</th>
          <th>Note</th>
        </tr></thead>
        <tbody id="log-body"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-exo-name">—</div>
        <div class="modal-tag" id="modal-exo-tag">—</div>
      </div>
      <button class="close-btn" id="modal-close">✕</button>
    </div>

    <!-- Graphe mini -->
    <div class="graph-wrap">
      <canvas id="pr-chart" height="90"></canvas>
    </div>

    <!-- Formulaire ajout -->
    <div style="margin-top:18px;">
      <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em;">Nouvelle entrée</div>
      <div class="form-row">
        <div class="form-group">
          <label id="lbl-val1">Charge (kg)</label>
          <input type="number" id="inp-val1" step="0.5" min="0" placeholder="ex: 80">
        </div>
        <div class="form-group">
          <label id="lbl-val2">Reps</label>
          <input type="number" id="inp-val2" min="1" placeholder="ex: 5">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Séries</label>
          <input type="number" id="inp-sets" min="1" placeholder="ex: 3">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="inp-date">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>Note (optionnel)</label>
        <textarea id="inp-note" placeholder="Ressenti, contexte, conditions…"></textarea>
      </div>
      <button class="btn-primary" id="btn-save-entry">Enregistrer</button>
    </div>

    <!-- Historique -->
    <div class="history-section">
      <div class="history-title">Historique</div>
      <div class="history-list" id="modal-history"></div>
    </div>
  </div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const EXERCISES = {
  push: [
    { id: 'bp',    name: 'Développé couché', tag: 'Charge × Reps', type: 'weight' },
    { id: 'ohp',   name: 'Développé militaire', tag: 'Charge × Reps', type: 'weight' },
    { id: 'dips',  name: 'Dips lestés', tag: 'Lest + poids corps', type: 'weight' },
    { id: 'push',  name: 'Pompes lestées', tag: 'Lest + poids corps', type: 'weight' },
    { id: 'hspu',  name: 'HSPU', tag: 'Reps (progression)', type: 'reps' },
    { id: 'pike',  name: 'Pike push-up', tag: 'Reps', type: 'reps' },
    { id: 'incl',  name: 'Développé incliné', tag: 'Charge × Reps', type: 'weight' },
  ],
  pull: [
    { id: 'trac',  name: 'Tractions lestées', tag: 'Lest + poids corps', type: 'weight' },
    { id: 'tracpdc', name: 'Tractions pdc', tag: 'Reps', type: 'reps' },
    { id: 'musc',  name: 'Muscle-up', tag: 'Reps consécutives', type: 'reps' },
    { id: 'row',   name: 'Rowing barre', tag: 'Charge × Reps', type: 'weight' },
    { id: 'curl',  name: 'Curl barre', tag: 'Charge × Reps', type: 'weight' },
    { id: 'facep', name: 'Face pull', tag: 'Charge × Reps', type: 'weight' },
    { id: 'austr', name: 'Australiennes lestées', tag: 'Lest + poids corps', type: 'weight' },
  ],
  legs: [
    { id: 'squat', name: 'Back squat', tag: 'Charge × Reps', type: 'weight' },
    { id: 'rdl',   name: 'Romanian DL', tag: 'Charge × Reps', type: 'weight' },
    { id: 'hack',  name: 'Hack squat machine', tag: 'Charge × Reps', type: 'weight' },
    { id: 'bss',   name: 'Bulgarian split squat', tag: 'Charge × Reps', type: 'weight' },
    { id: 'pistp', name: 'Pistol squat', tag: 'Reps par jambe', type: 'reps' },
    { id: 'calf',  name: 'Mollets debout', tag: 'Charge × Reps', type: 'weight' },
    { id: 'bxstep',name: 'Box step up lesté', tag: 'Charge × Reps', type: 'weight' },
  ],
  core: [
    { id: 'hnd',   name: 'Handstand libre', tag: 'Durée (s)', type: 'time' },
    { id: 'hndwall',name: 'Handstand mur', tag: 'Durée (s)', type: 'time' },
    { id: 'llev',  name: 'L-sit', tag: 'Durée (s)', type: 'time' },
    { id: 'frlev', name: 'Front lever', tag: 'Durée (s)', type: 'time' },
    { id: 'plank', name: 'Gainage', tag: 'Durée (s)', type: 'time' },
    { id: 'abw',   name: 'Ab wheel', tag: 'Reps', type: 'reps' },
    { id: 'toebt', name: 'Toes to bar', tag: 'Reps', type: 'reps' },
  ],
  cardio: [
    { id: 'jrope', name: 'Corde à sauter', tag: 'Durée ou sauts', type: 'time' },
    { id: 'tmill', name: 'Tapis incliné', tag: 'Distance (km)', type: 'dist' },
    { id: 'run',   name: 'Course à pied', tag: 'Distance (km)', type: 'dist' },
  ],
};

const ALL_EXO = Object.values(EXERCISES).flat();
const EXO_MAP = Object.fromEntries(ALL_EXO.map(e => [e.id, e]));

// ── STORAGE ───────────────────────────────────────────────────────────────────
const KEY = 'pr_tracker_v1';
function load() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch { return {}; } }
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }
let DB = load(); // { [exoId]: [{date,v1,v2,sets,note,ts}] }

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentExo = null;

// ── TABS ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'log') renderLog();
  });
});

// ── GRID RENDER ───────────────────────────────────────────────────────────────
function getPRValue(exo) {
  const entries = DB[exo.id] || [];
  if (!entries.length) return null;
  if (exo.type === 'weight') {
    return entries.reduce((best, e) => (e.v1 > (best?.v1 || 0) ? e : best), null);
  }
  if (exo.type === 'reps' || exo.type === 'time' || exo.type === 'dist') {
    return entries.reduce((best, e) => (e.v1 > (best?.v1 || 0) ? e : best), null);
  }
  return null;
}

function formatPR(exo, entry) {
  if (!entry) return null;
  if (exo.type === 'weight') return { main: entry.v1 + ' kg', sub: entry.v2 ? '× ' + entry.v2 : '' };
  if (exo.type === 'reps')   return { main: entry.v1 + ' reps', sub: entry.sets ? entry.sets + ' séries' : '' };
  if (exo.type === 'time')   return { main: entry.v1 + ' s', sub: '' };
  if (exo.type === 'dist')   return { main: entry.v1 + ' km', sub: '' };
  return null;
}

function renderGrid(cat) {
  const grid = document.getElementById('grid-' + cat);
  if (!grid) return;
  grid.innerHTML = '';
  EXERCISES[cat].forEach(exo => {
    const pr = getPRValue(exo);
    const fmt = formatPR(exo, pr);
    const card = document.createElement('div');
    card.className = 'exo-card' + (pr ? ' has-pr' : '');
    card.innerHTML = `
      <div class="exo-name">${exo.name}</div>
      <div class="exo-tag">${exo.tag}</div>
      <div class="pr-display">
        ${fmt ? `
          <div class="pr-pill">
            <span class="val">${fmt.main}</span>
            <span class="lbl">PR</span>
          </div>
          ${fmt.sub ? `<div class="pr-pill"><span class="val" style="font-size:12px">${fmt.sub}</span><span class="lbl">détail</span></div>` : ''}
        ` : `<div class="pr-pill empty"><span class="val">—</span><span class="lbl">aucun PR</span></div>`}
      </div>
      <div style="margin-top:10px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">
        ${(DB[exo.id]||[]).length} entrée${(DB[exo.id]||[]).length!==1?'s':''} · cliquer pour saisir
      </div>`;
    card.addEventListener('click', () => openModal(exo));
    grid.appendChild(card);
  });
}

function renderAllGrids() {
  Object.keys(EXERCISES).forEach(cat => renderGrid(cat));
  updateHeaderStats();
}

function updateHeaderStats() {
  const all = Object.values(DB).flat();
  document.getElementById('stat-total').textContent = all.length;
  document.getElementById('stat-exos').textContent = Object.keys(DB).filter(k => DB[k]?.length).length;
  document.getElementById('stat-prs').textContent = ALL_EXO.filter(e => getPRValue(e)).length;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(exo) {
  currentExo = exo;
  document.getElementById('modal-exo-name').textContent = exo.name;
  document.getElementById('modal-exo-tag').textContent = exo.tag;
  // Labels adaptatifs
  if (exo.type === 'weight') {
    document.getElementById('lbl-val1').textContent = 'Charge (kg)';
    document.getElementById('lbl-val2').textContent = 'Reps';
    document.getElementById('inp-val1').placeholder = 'ex: 80';
    document.getElementById('inp-val2').placeholder = 'ex: 5';
    document.getElementById('inp-val2').parentElement.style.display = '';
  } else if (exo.type === 'reps') {
    document.getElementById('lbl-val1').textContent = 'Reps';
    document.getElementById('lbl-val2').textContent = 'Qualité (1-10)';
    document.getElementById('inp-val1').placeholder = 'ex: 8';
    document.getElementById('inp-val2').placeholder = 'ex: 9';
    document.getElementById('inp-val2').parentElement.style.display = '';
  } else if (exo.type === 'time') {
    document.getElementById('lbl-val1').textContent = 'Durée (secondes)';
    document.getElementById('lbl-val2').textContent = 'Qualité (1-10)';
    document.getElementById('inp-val1').placeholder = 'ex: 30';
    document.getElementById('inp-val2').placeholder = 'optionnel';
    document.getElementById('inp-val2').parentElement.style.display = '';
  } else if (exo.type === 'dist') {
    document.getElementById('lbl-val1').textContent = 'Distance (km)';
    document.getElementById('lbl-val2').textContent = 'Durée (min)';
    document.getElementById('inp-val1').placeholder = 'ex: 5';
    document.getElementById('inp-val2').placeholder = 'ex: 30';
    document.getElementById('inp-val2').parentElement.style.display = '';
  }
  // Date par défaut = aujourd'hui
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('inp-date').value = today;
  document.getElementById('inp-val1').value = '';
  document.getElementById('inp-val2').value = '';
  document.getElementById('inp-sets').value = '';
  document.getElementById('inp-note').value = '';
  renderModalHistory(exo);
  drawChart(exo);
  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  currentExo = null;
}

// ── SAVE ENTRY ────────────────────────────────────────────────────────────────
document.getElementById('btn-save-entry').addEventListener('click', () => {
  if (!currentExo) return;
  const v1 = parseFloat(document.getElementById('inp-val1').value);
  if (isNaN(v1) || v1 < 0) { alert('Saisis une valeur valide.'); return; }
  const v2   = parseFloat(document.getElementById('inp-val2').value) || null;
  const sets = parseInt(document.getElementById('inp-sets').value) || null;
  const date = document.getElementById('inp-date').value || new Date().toISOString().split('T')[0];
  const note = document.getElementById('inp-note').value.trim();
  if (!DB[currentExo.id]) DB[currentExo.id] = [];
  DB[currentExo.id].push({ date, v1, v2, sets, note, ts: Date.now() });
  DB[currentExo.id].sort((a,b) => a.date.localeCompare(b.date));
  save(DB);
  renderModalHistory(currentExo);
  drawChart(currentExo);
  renderGrid(getCat(currentExo.id));
  updateHeaderStats();
  document.getElementById('inp-val1').value = '';
  document.getElementById('inp-val2').value = '';
  document.getElementById('inp-sets').value = '';
  document.getElementById('inp-note').value = '';
});

function getCat(id) {
  return Object.keys(EXERCISES).find(c => EXERCISES[c].some(e => e.id === id));
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function isPR(exo, entry) {
  const entries = (DB[exo.id] || []).filter(e => e.ts <= entry.ts);
  return entry.v1 === Math.max(...entries.map(e => e.v1));
}

function renderModalHistory(exo) {
  const list = document.getElementById('modal-history');
  const entries = [...(DB[exo.id] || [])].reverse();
  if (!entries.length) { list.innerHTML = '<div class="empty"><span>📭</span>Aucune entrée pour le moment</div>'; return; }
  const pr = getPRValue(exo);
  list.innerHTML = entries.map((e, i) => {
    const isTopPR = pr && e.ts === pr.ts;
    let val = exo.type === 'weight'
      ? e.v1 + ' kg' + (e.v2 ? ' × ' + e.v2 + ' reps' : '') + (e.sets ? ' · ' + e.sets + ' séries' : '')
      : exo.type === 'reps' ? e.v1 + ' reps' + (e.sets ? ' · ' + e.sets + ' séries' : '')
      : exo.type === 'time' ? e.v1 + ' s'
      : e.v1 + ' km' + (e.v2 ? ' en ' + e.v2 + ' min' : '');
    return `<div class="history-entry${isTopPR ? ' is-pr' : ''}">
      <span class="h-date">${e.date}</span>
      <span class="h-val">${val}</span>
      ${isTopPR ? '<span class="pr-badge">PR</span>' : ''}
      <span class="h-note">${e.note || ''}</span>
      <button class="h-del" data-idx="${entries.length - 1 - i}" title="Supprimer">✕</button>
    </div>`;
  }).join('');

  list.querySelectorAll('.h-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      DB[exo.id].splice(idx, 1);
      save(DB);
      renderModalHistory(exo);
      drawChart(exo);
      renderGrid(getCat(exo.id));
      updateHeaderStats();
    });
  });
}

// ── CHART ─────────────────────────────────────────────────────────────────────
function drawChart(exo) {
  const canvas = document.getElementById('pr-chart');
  const ctx = canvas.getContext('2d');
  const entries = DB[exo.id] || [];
  const W = canvas.offsetWidth || 420;
  const H = 90;
  canvas.width = W * window.devicePixelRatio;
  canvas.height = H * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.clearRect(0, 0, W, H);

  if (entries.length < 2) {
    ctx.fillStyle = '#2a2d35';
    ctx.font = '11px DM Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(entries.length === 0 ? 'Aucune donnée' : 'Ajoute au moins 2 entrées pour le graphe', W/2, H/2);
    return;
  }

  const vals = entries.map(e => e.v1);
  const min = Math.min(...vals) * 0.92;
  const max = Math.max(...vals) * 1.05;
  const pad = { t: 10, r: 10, b: 20, l: 30 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;
  const toX = i => pad.l + (i / (entries.length - 1)) * cw;
  const toY = v => pad.t + ch - ((v - min) / (max - min)) * ch;

  // Grid
  ctx.strokeStyle = '#2a2d35';
  ctx.lineWidth = 0.5;
  [0, 0.5, 1].forEach(f => {
    const y = pad.t + ch * (1 - f);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + cw, y); ctx.stroke();
    const lbl = (min + (max - min) * f).toFixed(exo.type === 'dist' ? 1 : 0);
    ctx.fillStyle = '#5a6070';
    ctx.font = '9px DM Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(lbl, pad.l - 4, y + 3);
  });

  // Line
  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
  grad.addColorStop(0, 'rgba(200,241,53,.15)');
  grad.addColorStop(1, 'rgba(200,241,53,0)');

  ctx.beginPath();
  entries.forEach((e, i) => { i === 0 ? ctx.moveTo(toX(i), toY(e.v1)) : ctx.lineTo(toX(i), toY(e.v1)); });
  ctx.lineTo(toX(entries.length-1), pad.t+ch);
  ctx.lineTo(toX(0), pad.t+ch);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.beginPath();
  entries.forEach((e, i) => { i === 0 ? ctx.moveTo(toX(i), toY(e.v1)) : ctx.lineTo(toX(i), toY(e.v1)); });
  ctx.strokeStyle = '#c8f135';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Dots
  entries.forEach((e, i) => {
    const x = toX(i), y = toY(e.v1);
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI*2);
    ctx.fillStyle = '#c8f135'; ctx.fill();
  });
}

// ── LOG GLOBAL ────────────────────────────────────────────────────────────────
function renderLog() {
  // Populate filter select
  const sel = document.getElementById('filter-exo');
  sel.innerHTML = '<option value="">Tous les exercices</option>';
  ALL_EXO.filter(e => (DB[e.id]||[]).length).forEach(e => {
    sel.innerHTML += `<option value="${e.id}">${e.name}</option>`;
  });

  buildLogTable();
  sel.onchange = buildLogTable;
  document.getElementById('filter-from').onchange = buildLogTable;
  document.getElementById('filter-to').onchange = buildLogTable;
  document.getElementById('filter-pr').onchange = buildLogTable;
}

function buildLogTable() {
  const exoF = document.getElementById('filter-exo').value;
  const from = document.getElementById('filter-from').value;
  const to   = document.getElementById('filter-to').value;
  const prOnly = document.getElementById('filter-pr').checked;

  let rows = [];
  ALL_EXO.forEach(exo => {
    if (exoF && exo.id !== exoF) return;
    const entries = DB[exo.id] || [];
    entries.forEach(e => {
      if (from && e.date < from) return;
      if (to && e.date > to) return;
      const pr = getPRValue(exo);
      const isP = pr && e.ts === pr.ts;
      if (prOnly && !isP) return;
      rows.push({ exo, entry: e, isPR: isP });
    });
  });
  rows.sort((a,b) => b.entry.date.localeCompare(a.entry.date));

  const tbody = document.getElementById('log-body');
  if (!rows.length) { tbody.innerHTML = `<tr><td colspan="5" style="padding:30px;text-align:center;color:var(--muted)">Aucune donnée</td></tr>`; return; }

  tbody.innerHTML = rows.map(({ exo, entry, isPR }) => {
    let val = exo.type === 'weight'
      ? entry.v1 + ' kg' + (entry.v2 ? ' × ' + entry.v2 : '') + (entry.sets ? ' · ' + entry.sets + 's' : '')
      : exo.type === 'reps' ? entry.v1 + ' reps'
      : exo.type === 'time' ? entry.v1 + ' s'
      : entry.v1 + ' km';
    return `<tr>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${entry.date}</td>
      <td style="font-weight:500">${exo.name}</td>
      <td class="td-val">${val}</td>
      <td class="td-pr">${isPR ? '🏆 PR' : ''}</td>
      <td class="td-note">${entry.note || ''}</td>
    </tr>`;
  }).join('');
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pr_tracker_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
renderAllGrids();
</script>
